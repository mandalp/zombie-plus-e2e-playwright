name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pwd123
          POSTGRES_DB: zombieplus
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d zombieplus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          zombieplus/api/package-lock.json
          zombieplus/web/package-lock.json

    - name: Install application dependencies
      working-directory: ./zombieplus/web
      run: npm ci

    - name: Install API dependencies
      working-directory: ./zombieplus/api
      run: npm ci

    - name: Install test dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Start API server
      working-directory: ./zombieplus/api
      run: |
        npm run dev > zombieplus-api.log 2>&1 &
        echo $! > api.pid
      env:
        BASE_API: http://localhost:3333
        BASE_URL: http://localhost:3000
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: pwd123
        DB_DATABASE: zombieplus

    - name: Start Web server
      working-directory: ./zombieplus/web
      run: |
        npm run dev > zombieplus-web.log 2>&1 &
        echo $! > web.pid
      env:
        BASE_API: http://localhost:3333
        BASE_URL: http://localhost:3000

    - name: Wait for services to be ready
      run: |
        echo "Waiting for API and Web..."
        npx wait-on --timeout 60000 --verbose http-get://localhost:3333 http-get://localhost:3000

    - name: Run E2E tests
      run: npx playwright test --workers=1
      env:
        BASE_API: http://localhost:3333
        BASE_URL: http://localhost:3000
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: pwd123
        DB_DATABASE: zombieplus
        CI: true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30

    - name: Upload API Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-logs
        path: zombieplus/api/zombieplus-api.log
        retention-days: 30

    - name: Upload Web Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: web-logs
        path: zombieplus/web/zombieplus-web.log
        retention-days: 30
